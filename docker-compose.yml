services:

  # ─── Aplicación Laravel (PHP-FPM) ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketwave_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www                          # código fuente en tiempo real
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
    networks:
      - ticketwave_net
    depends_on:
      db:
        condition: service_healthy          # espera a que MySQL esté listo

  # ─── Servidor web Nginx ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ticketwave_nginx
    restart: unless-stopped
    ports:
      - "8000:80"                           # accede en http://localhost:8000
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ticketwave_net
    depends_on:
      - app

  # ─── Base de datos MySQL 8 ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: ticketwave_db
    restart: unless-stopped
    ports:
      - "3306:3306"                         # accede con TablePlus / DBeaver
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ticketwave}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret_root}
      MYSQL_USER: ${DB_USERNAME:-ticketwave_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ticketwave_db_data:/var/lib/mysql    # datos persistentes entre reinicios
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - ticketwave_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret_root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── phpMyAdmin (opcional, para ver la BD visualmente) ──────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: ticketwave_pma
    restart: unless-stopped
    ports:
      - "8080:80"                           # accede en http://localhost:8080
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME:-ticketwave_user}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    networks:
      - ticketwave_net
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools                               # solo se levanta con: docker compose --profile tools up

# ─── Volúmenes persistentes ──────────────────────────────────────────────────
volumes:
  ticketwave_db_data:
    driver: local

# ─── Red interna compartida ──────────────────────────────────────────────────
networks:
  ticketwave_net:
    driver: bridge
