server {
    listen 80;
    server_name localhost;

    # Raíz del proyecto Laravel
    root /var/www/public;
    index index.php index.html;

    # Logging
    access_log /var/log/nginx/ticketwave_access.log;
    error_log  /var/log/nginx/ticketwave_error.log;

    # Todas las rutas pasan por index.php (necesario para Laravel)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Archivos estáticos — no pasan por PHP
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Procesamiento de PHP a través de PHP-FPM
    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.(ht|git|env) {
        deny all;
        return 404;
    }

    # Tamaño máximo de archivos subidos (para imágenes de eventos)
    client_max_body_size 20M;
}
